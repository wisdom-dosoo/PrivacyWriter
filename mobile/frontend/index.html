<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrivacyWriter Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for mobile feel */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 bg-gray-800 border-b border-gray-700 shadow-md z-10">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🔒</span>
            <h1 class="text-lg font-bold bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">
                PrivacyWriter
            </h1>
        </div>
        <div class="text-xs text-gray-400 px-2 py-1 bg-gray-700 rounded-full">Beta</div>
    </header>

    <!-- Main Content: Text Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <textarea 
            id="input-text" 
            class="flex-1 w-full bg-gray-900 p-4 text-lg resize-none focus:outline-none placeholder-gray-600"
            placeholder="Type or paste text here to analyze..."
        ></textarea>

        <!-- Floating Result Card (Hidden by default) -->
        <div id="result-card" class="hidden absolute bottom-0 left-0 right-0 bg-gray-800 rounded-t-2xl shadow-2xl border-t border-gray-700 transform transition-transform duration-300 translate-y-full">
            <div class="p-4">
                <div class="flex justify-between items-center mb-3">
                    <span id="result-type" class="text-xs font-bold uppercase tracking-wider text-emerald-400">Result</span>
                    <button onclick="closeResult()" class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="result-content" class="text-gray-200 text-base leading-relaxed max-h-60 overflow-y-auto mb-4">
                    <!-- Result goes here -->
                </div>
                <div class="flex gap-2">
                    <button onclick="copyResult()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg font-medium transition">
                        Copy
                    </button>
                    <button onclick="replaceText()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg font-medium transition">
                        Replace
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden absolute inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-500"></div>
    </div>

    <!-- Bottom Toolbar -->
    <nav class="bg-gray-800 border-t border-gray-700 px-2 py-2 pb-safe">
        <div class="flex justify-between items-center gap-2 overflow-x-auto no-scrollbar px-2">
            
            <!-- Grammar -->
            <button onclick="processText('grammar')" class="flex flex-col items-center min-w-[70px] p-2 rounded-lg active:bg-gray-700 transition">
                <span class="text-2xl mb-1">✏️</span>
                <span class="text-[10px] font-medium text-gray-300">Fix</span>
            </button>

            <!-- Rewrite -->
            <div class="relative group">
                <button onclick="toggleMenu('rewrite-menu')" class="flex flex-col items-center min-w-[70px] p-2 rounded-lg active:bg-gray-700 transition">
                    <span class="text-2xl mb-1">🔄</span>
                    <span class="text-[10px] font-medium text-gray-300">Rewrite</span>
                </button>
                <!-- Rewrite Dropup -->
                <div id="rewrite-menu" class="hidden absolute bottom-full left-0 mb-2 w-32 bg-gray-700 rounded-lg shadow-xl border border-gray-600 overflow-hidden">
                    <button onclick="processText('rewrite', 'professional')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600 border-b border-gray-600">💼 Professional</button>
                    <button onclick="processText('rewrite', 'casual')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600 border-b border-gray-600">😎 Casual</button>
                    <button onclick="processText('rewrite', 'concise')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600">✂️ Concise</button>
                </div>
            </div>

            <!-- Summarize -->
            <button onclick="processText('summarize')" class="flex flex-col items-center min-w-[70px] p-2 rounded-lg active:bg-gray-700 transition">
                <span class="text-2xl mb-1">📋</span>
                <span class="text-[10px] font-medium text-gray-300">Summary</span>
            </button>

            <!-- Translate -->
            <div class="relative">
                <button onclick="toggleMenu('translate-menu')" class="flex flex-col items-center min-w-[70px] p-2 rounded-lg active:bg-gray-700 transition">
                    <span class="text-2xl mb-1">🌐</span>
                    <span class="text-[10px] font-medium text-gray-300">Translate</span>
                </button>
                <!-- Translate Dropup -->
                <div id="translate-menu" class="hidden absolute bottom-full right-0 mb-2 w-32 bg-gray-700 rounded-lg shadow-xl border border-gray-600 overflow-hidden">
                    <button onclick="processText('translate', 'es')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600 border-b border-gray-600">🇪🇸 Spanish</button>
                    <button onclick="processText('translate', 'fr')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600 border-b border-gray-600">🇫🇷 French</button>
                    <button onclick="processText('translate', 'de')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600 border-b border-gray-600">🇩🇪 German</button>
                    <button onclick="processText('translate', 'jp')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-600">🇯🇵 Japanese</button>
                </div>
            </div>

        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
