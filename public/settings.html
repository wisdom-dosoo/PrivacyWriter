<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - PrivacyWriter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --page-bg: #f9fafb;
      --container-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --item-bg: #ffffff;
      --hover-bg: #f3f4f6;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --danger: #ef4444;
      --success: #10b981;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #111827;
        --container-bg: #1f2937; 
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --border: #374151;
        --item-bg: #1f2937;
        --hover-bg: #374151;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--page-bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--container-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 80vh;
    }

    .header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 { font-size: 1.5rem; font-weight: 700; }

    /* Responsive Layout */
    .settings-layout {
      display: flex;
      flex: 1;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--page-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
    }

    .settings-tab {
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .settings-tab:hover {
      background: var(--hover-bg);
      color: var(--text-main);
    }

    .settings-tab.active {
      background: var(--container-bg);
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 600;
    }

    /* Main Content */
    .content-area {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Form Elements */
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-desc { font-size: 0.85em; color: var(--text-muted); margin-bottom: 10px; display: block; }
    
    input[type="text"], input[type="number"], input[type="password"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--item-bg);
      color: var(--text-main);
      font-size: 0.95em;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

    .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; cursor: pointer; }
    .checkbox-group input { width: 16px; height: 16px; }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.9em;
    }
    .btn:active { transform: translateY(1px); }
    
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    
    .btn-secondary { background: var(--hover-bg); color: var(--text-main); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e5e7eb; }

    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn-danger:hover { background: #fecaca; }

    .actions { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }

    /* Status Message (Toast) */
    .status-message {
      position: fixed; bottom: 20px; right: 20px;
      padding: 12px 24px; border-radius: 8px;
      color: white; font-weight: 500;
      opacity: 0; pointer-events: none; transition: all 0.3s;
      transform: translateY(10px);
    }
    .status-message.visible { opacity: 1; transform: translateY(0); }
    .status-message.success { background: var(--success); }
    .status-message.error { background: var(--danger); }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {
      .container { height: auto; min-height: 100vh; border-radius: 0; }
      .settings-layout { flex-direction: column; }
      
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex;
        overflow-x: auto;
        padding: 0 10px;
        background: var(--container-bg);
      }

      .settings-tab {
        white-space: nowrap;
        padding: 15px 20px;
        border-left: none;
        border-bottom: 3px solid transparent;
      }

      .settings-tab.active {
        border-left-color: transparent;
        border-bottom-color: var(--primary);
        background: transparent;
      }
      
      .content-area { padding: 20px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ Settings</h1>
      <button id="btnCloseSettings" class="btn btn-secondary">✕ Close</button>
  
    </div>

    <div class="settings-layout">
      <!-- Sidebar Navigation -->
      <div class="sidebar">
        <div class="settings-tab active" data-tab="general">General</div>
        <div class="settings-tab" data-tab="ai">AI & Models</div>
        <div class="settings-tab" data-tab="privacy">Privacy & Data</div>
        <div class="settings-tab" data-tab="cloud">Cloud Sync</div>
      </div>

      <div class="content-area">
        <!-- General Tab -->
        <div id="general" class="tab-content active">
          <div class="form-group">
            <label for="theme">Appearance</label>
            <select id="theme">
              <option value="light">Light Mode</option>
              <option value="dark">Dark Mode</option>
            </select>
          </div>
          <div class="form-group">
            <label for="language">Interface Language</label>
            <select id="language">
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
            </select>
          </div>
          <label class="checkbox-group">
            <input type="checkbox" id="autoSaveHistory">
            <span>Auto-save writing history</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" id="showShortcuts">
            <span>Show keyboard shortcuts in tooltips</span>
          </label>
          <div class="actions">
            <button id="btnSaveGeneral" class="btn btn-primary">Save Changes</button>
            <button id="btnResetGeneral" class="btn btn-secondary">Reset Defaults</button>
          </div>
        </div>

        <!-- AI Models Tab -->
        <div id="ai" class="tab-content">
          <div id="modelStatus" style="margin-bottom: 20px;"></div>
          <div class="form-group">
            <label>Cloud Fallback (Pro)</label>
            <label class="checkbox-group">
              <input type="checkbox" id="useClaudeAPI">
              <span>Enable Anthropic Claude API</span>
            </label>
            <input type="password" id="claudeApiKey" placeholder="sk-ant-...">
          </div>
          <label class="checkbox-group">
            <input type="checkbox" id="localOnly">
            <span>Force Local Processing Only (Privacy Mode)</span>
          </label>
          <div class="actions">
            <button id="btnSaveAI" class="btn btn-primary">Save Configuration</button>
            <button id="btnTestAI" class="btn btn-secondary">Test Connection</button>
          </div>
        </div>

        <!-- Privacy Tab -->
        <div id="privacy" class="tab-content">
          <div class="form-group">
            <label>Data Security</label>
            <label class="checkbox-group">
              <input type="checkbox" id="encryptStorage">
              <span>Encrypt local storage</span>
            </label>
            <label class="checkbox-group">
              <input type="checkbox" id="disableAnalytics">
              <span>Disable anonymous usage statistics</span>
            </label>
          </div>
          <div class="form-group">
            <label for="sessionTimeout">Session Timeout (minutes)</label>
            <input type="number" id="sessionTimeout" min="5" max="120">
          </div>
          <div class="actions">
            <button id="btnSavePrivacy" class="btn btn-primary">Save Privacy Settings</button>
          </div>
          <div style="margin-top: 40px;">
            <h3 style="color: var(--danger); margin-bottom: 15px;">Danger Zone</h3>
            <div class="actions" style="border-top: none; padding-top: 0;">
              <button id="btnClearHistory" class="btn btn-danger">Clear History</button>
              <button id="btnClearCache" class="btn btn-danger">Clear Cache</button>
              <button id="btnClearAllData" class="btn btn-danger">Delete All Data</button>
              <button id="btnExportData" class="btn btn-secondary">Export Backup</button>
            </div>
          </div>
        </div>

        <!-- Cloud Sync Tab -->
        <div id="cloud" class="tab-content">
          <div class="form-group">
            <label for="cloudUrl">Sync Server URL</label>
            <input type="text" id="cloudUrl" placeholder="https://api.privacywriter.app/sync">
          </div>
          <div class="form-group">
            <label for="syncPassword">Encryption Password</label>
            <input type="password" id="syncPassword" placeholder="Enter password to decrypt data">
          </div>
          <label class="checkbox-group">
            <input type="checkbox" id="autoSync">
            <span>Auto-sync when online</span>
          </label>
          <div class="actions">
            <button id="btnSaveCloud" class="btn btn-primary">Save Settings</button>
            <button id="btnPerformSync" class="btn btn-secondary">Sync Now</button>
            <button id="btnTestCloud" class="btn btn-secondary">Test Connection</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="statusMessage" class="status-message"></div>
  <script src="settings.js"></script>
</body>
</html>
